services:
  web:
    build: .
    command: sh -c "${APP_CMD:-npm run dev}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/alles_inventory}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@postgres:5432/alles_inventory}
      FILE_STORAGE_ROOT: /data/uploads
      DOCUMENTS_STORAGE_ROOT: /data/documents
      BACKUP_ROOT: /data/backups
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./data:/data
    depends_on:
      - postgres

  worker:
    build: .
    command: sh -c "${WORKER_CMD:-npm run worker}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/alles_inventory}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@postgres:5432/alles_inventory}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      DOCUMENTS_STORAGE_ROOT: /data/documents
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./data:/data
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alles_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  app_node_modules:
